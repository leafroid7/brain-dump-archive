<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dump Archive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

    .topbar { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-size: 15px; font-weight: 700; flex: 1; }
    .btn-add { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { background: #333; }

    /* PARA 탭 */
    .para-bar { background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; overflow-x: auto; scrollbar-width: none; }
    .para-bar::-webkit-scrollbar { display: none; }
    .para-btn { padding: 10px 16px; font-size: 12px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .para-btn:hover { color: #333; }
    .para-btn.active { color: #e8600a; border-bottom-color: #e8600a; font-weight: 700; }

    /* 폴더 바 */
    .folder-bar { background: #2a2a2a; padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .folder-bar::-webkit-scrollbar { display: none; }
    .folder-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid #444; background: #3a3a3a; cursor: pointer; color: #ccc; white-space: nowrap; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
    .folder-btn:hover { border-color: #888; color: #fff; }
    .folder-btn.active { background: #e8600a; color: #fff; border-color: #e8600a; }
    .folder-icon { font-size: 12px; }

    /* IPOR 도트 */
    .ipor-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ipor-INPUT   { background: #f87171; }
    .ipor-PROCESS { background: #fbbf24; }
    .ipor-OUTPUT  { background: #34d399; }
    .ipor-REST    { background: #94a3b8; }

    /* 활용도 필터 — 태그 스타일 */
    .status-bar { background: #f5f5f0; padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; align-items: center; }
    .status-bar::-webkit-scrollbar { display: none; }
    .status-label { font-size: 11px; color: #aaa; white-space: nowrap; margin-right: 2px; }
    .status-btn {
      padding: 3px 10px; border-radius: 4px; font-size: 11px;
      border: none; cursor: pointer; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
      font-weight: 500; transition: opacity 0.15s;
      opacity: 0.45;
    }
    .status-btn.active { opacity: 1; }
    .status-btn:hover { opacity: 0.8; }
    .sb-all   { background: #e8e8e8; color: #555; }
    .sb-분류전 { background: #e8e8e8; color: #555; }
    .sb-저장  { background: #dbeafe; color: #2563eb; }
    .sb-필요  { background: #ffedd5; color: #c2410c; }
    .sb-폐기  { background: #ede9fe; color: #7c3aed; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sdot-all   { background: #aaa; }
    .sdot-분류전 { background: #bbb; }
    .sdot-저장  { background: #2563eb; }
    .sdot-필요  { background: #c2410c; }
    .sdot-폐기  { background: #7c3aed; }

    /* 갤러리 */
    .gallery { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

    /* 카드 */
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 16px; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
    .card-content { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

    /* 활용도 배지 */
    .badge-status { font-size: 11px; padding: 2px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 5px; font-weight: 500; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .s-분류전 { background: #f0f0f0; color: #777; }
    .s-분류전 .status-dot { background: #bbb; }
    .s-저장   { background: #dbeafe; color: #2563eb; }
    .s-저장   .status-dot { background: #2563eb; }
    .s-필요   { background: #ffedd5; color: #c2410c; }
    .s-필요   .status-dot { background: #c2410c; }
    .s-폐기   { background: #ede9fe; color: #7c3aed; }
    .s-폐기   .status-dot { background: #7c3aed; }

    /* 폴더 배지 */
    .badge-folder { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: #f0f0f0; color: #555; display: inline-flex; align-items: center; gap: 3px; }
    .badge-folder-icon { font-size: 11px; }
    .badge-para-tag { font-size: 9px; background: #e0e0e0; color: #888; border-radius: 3px; padding: 1px 4px; font-weight: 600; }

    /* 날짜 */
    .card-date { font-size: 10px; color: #bbb; margin-bottom: 6px; }

    /* 링크 버튼 */
    .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #2563eb; background: #dbeafe; border-radius: 6px; padding: 3px 9px; text-decoration: none; margin-top: 2px; transition: background 0.15s; }
    .card-link:hover { background: #bfdbfe; }

    .spinner { display: flex; justify-content: center; padding: 60px; font-size: 13px; color: #aaa; }

    /* 모달 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.03em; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid #e0e0e0; font-size: 13px; font-family: inherit; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #1a1a1a; }
    .modal-date { font-size: 11px; color: #bbb; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { padding: 8px 16px; border-radius: 8px; font-size: 13px; border: 1px solid #e0e0e0; background: #fff; cursor: pointer; }
    .btn-save { padding: 8px 16px; border-radius: 8px; font-size: 13px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .empty { text-align: center; padding: 60px 24px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🗂 Brain Dump Archive</h1>
    <button class="btn-add" onclick="openAddModal()">＋ 메모 추가</button>
  </div>

  <div class="para-bar">
    <button class="para-btn active" onclick="setPara(null, this)">전체</button>
    <button class="para-btn" onclick="setPara('pending', this)">Pending</button>
    <button class="para-btn" onclick="setPara('𝗣 | 현재 진행', this)">𝗣 현재 진행</button>
    <button class="para-btn" onclick="setPara('𝗔 | 상시 진행', this)">𝗔 상시 진행</button>
    <button class="para-btn" onclick="setPara('𝗥 | 관심분야', this)">𝗥 관심분야</button>
    <button class="para-btn" onclick="setPara('𝗔 | 보관함', this)">𝗔 보관함</button>
  </div>

  <div class="folder-bar" id="folderBar">
    <button class="folder-btn active" onclick="setFolder(null, this)">전체</button>
  </div>

  <div class="status-bar">
    <span class="status-label">활용도</span>
    <button class="status-btn sb-all active" onclick="setStatus(null, this)"><span class="sdot sdot-all"></span>전체</button>
    <button class="status-btn sb-분류전" onclick="setStatus('분류 전', this)"><span class="sdot sdot-분류전"></span>분류 전</button>
    <button class="status-btn sb-저장" onclick="setStatus('만약을 위해 저장', this)"><span class="sdot sdot-저장"></span>만약을 위해 저장</button>
    <button class="status-btn sb-필요" onclick="setStatus('꼭 필요함!!', this)"><span class="sdot sdot-필요"></span>꼭 필요함!!</button>
    <button class="status-btn sb-폐기" onclick="setStatus('폐기', this)"><span class="sdot sdot-폐기"></span>폐기</button>
  </div>

  <div class="gallery" id="gallery">
    <div class="spinner">불러오는 중...</div>
  </div>

  <div class="modal-overlay" id="memoModal">
    <div class="modal">
      <h2 id="modalTitle">메모 추가</h2>
      <div class="modal-date" id="modalDate"></div>
      <div class="form-group">
        <label>IDEA (제목)</label>
        <input type="text" id="fieldIdea" placeholder="아이디어나 메모 제목" />
      </div>
      <div class="form-group">
        <label>Content (내용)</label>
        <textarea id="fieldContent" rows="4" placeholder="요점 정리, 생각 메모..."></textarea>
      </div>
      <div class="form-group">
        <label>URL</label>
        <input type="url" id="fieldUrl" placeholder="https://" />
      </div>
      <div class="form-group">
        <label>활용도</label>
        <select id="fieldStatus">
          <option value="분류 전">분류 전</option>
          <option value="만약을 위해 저장">만약을 위해 저장</option>
          <option value="꼭 필요함!!">꼭 필요함!!</option>
          <option value="폐기">폐기</option>
        </select>
      </div>
      <div class="form-group">
        <label>BRAIN DUMP 폴더</label>
        <select id="fieldFolder"></select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" id="btnSave" onclick="saveMemo()">저장</button>
      </div>
    </div>
  </div>

  <script>
    let allMemos = [];
    let folders = [];
    let folderMap = {};
    let currentPara = null;
    let currentFolder = null;
    let currentStatus = null;
    let editingId = null;
    let pendingFolderId = null;

    const STATUS_CLASS = {
      '분류 전': 's-분류전',
      '만약을 위해 저장': 's-저장',
      '꼭 필요함!!': 's-필요',
      '폐기': 's-폐기'
    };

    const PARA_SHORT = {
      '𝗣 | 현재 진행': 'P',
      '𝗔 | 상시 진행': 'A',
      '𝗥 | 관심분야': 'R',
      '𝗔 | 보관함': 'A★'
    };

    // 볼드 특수문자 IPOR값 → CSS 클래스 매핑
    const IPOR_CLASS = {
      '𝗜𝗡𝗣𝗨𝗧':   'ipor-INPUT',
      '𝗣𝗥𝗢𝗖𝗘𝗦𝗦': 'ipor-PROCESS',
      '𝗢𝗨𝗧𝗣𝗨𝗧':  'ipor-OUTPUT',
      '𝗥𝗘𝗦𝗧':    'ipor-REST'
    };

    async function init() {
      await Promise.all([loadFolders(), loadMemos()]);
    }

    async function loadFolders() {
      try {
        const res = await fetch('/api/notion?action=getFolders');
        const data = await res.json();
        folders = data.folders || [];
        folderMap = {};
        folders.forEach(f => {
          folderMap[f.id] = f;
          if (f.name === 'Pending/Memo Box') pendingFolderId = f.id;
        });
        renderFolderBar();
        populateFolderSelect();
      } catch(e) { console.error('폴더 로드 실패:', e); }
    }

    async function loadMemos() {
      try {
        const params = new URLSearchParams({ action: 'getMemos' });
        if (currentFolder) params.set('folder_id', currentFolder);
        const res = await fetch('/api/notion?' + params);
        const data = await res.json();
        allMemos = data.memos || [];
        renderGallery();
      } catch(e) {
        document.getElementById('gallery').innerHTML = '<div class="empty">데이터를 불러오지 못했어요.</div>';
      }
    }

    function renderFolderBar() {
      const bar = document.getElementById('folderBar');
      bar.innerHTML = '<button class="folder-btn active" onclick="setFolder(null, this)">전체</button>';

      const filtered = currentPara === null
        ? folders
        : currentPara === 'pending'
          ? folders.filter(f => !f.para)
          : folders.filter(f => f.para === currentPara);

      filtered.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'folder-btn';
        const iconEl = f.icon ? `<span class="folder-icon">${f.icon}</span>` : '';
        const dotClass = f.ipor ? (IPOR_CLASS[f.ipor] || '') : '';
        const dotEl = dotClass ? `<span class="ipor-dot ${dotClass}"></span>` : '';
        btn.innerHTML = `${dotEl}${iconEl}${escHtml(f.name)}`;
        btn.onclick = () => {
          document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          setFolder(f.id, btn);
        };
        bar.appendChild(btn);
      });
    }

    function populateFolderSelect() {
      const sel = document.getElementById('fieldFolder');
      sel.innerHTML = '';
      if (pendingFolderId) {
        const opt = document.createElement('option');
        opt.value = pendingFolderId;
        opt.textContent = 'Pending/Memo Box';
        sel.appendChild(opt);
      }
      folders.forEach(f => {
        if (f.id === pendingFolderId) return;
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.name;
        sel.appendChild(opt);
      });
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      let memos = allMemos;

      if (currentStatus) memos = memos.filter(m => m.status === currentStatus);

      if (currentPara && !currentFolder) {
        const paraFolderIds = currentPara === 'pending'
          ? folders.filter(f => !f.para).map(f => f.id)
          : folders.filter(f => f.para === currentPara).map(f => f.id);
        memos = memos.filter(m => m.folders.some(id => paraFolderIds.includes(id)));
      }

      if (memos.length === 0) {
        gallery.innerHTML = '<div class="empty">메모가 없어요. ＋ 버튼으로 추가해보세요!</div>';
        return;
      }

      gallery.innerHTML = memos.map(m => {
        const sc = STATUS_CLASS[m.status] || 's-분류전';
        const statusBadge = `<span class="badge-status ${sc}"><span class="status-dot"></span>${escHtml(m.status || '분류 전')}</span>`;

        const folderBadges = m.folders
          .filter(id => folderMap[id])
          .map(id => {
            const f = folderMap[id];
            const iconEl = f.icon ? `<span class="badge-folder-icon">${f.icon}</span>` : '📁';
            const paraShort = f.para ? PARA_SHORT[f.para] || '' : '';
            const paraTag = paraShort ? `<span class="badge-para-tag">${paraShort}</span>` : '';
            return `<span class="badge-folder">${iconEl}${escHtml(f.name)}${paraTag}</span>`;
          }).join('');

        const dateStr = m.created ? `<div class="card-date">${formatDate(m.created)}</div>` : '';
        const linkBtn = m.url
          ? `<a class="card-link" href="${escHtml(m.url)}" target="_blank" onclick="event.stopPropagation()">🔗 링크</a>`
          : '';

        return `
          <div class="card" onclick="openEditModal('${m.id}')">
            <div class="card-title">${escHtml(m.idea || '(제목 없음)')}</div>
            ${m.content ? `<div class="card-content">${escHtml(m.content)}</div>` : ''}
            <div class="card-meta">${statusBadge}${folderBadges}</div>
            ${dateStr}
            ${linkBtn}
          </div>`;
      }).join('');
    }

    function setPara(val, btn) {
      currentPara = val;
      currentFolder = null;
      document.querySelectorAll('.para-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFolderBar();
      loadMemos();
    }

    function setFolder(id, btn) {
      currentFolder = id;
      document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadMemos();
    }

    function setStatus(val, btn) {
      currentStatus = val;
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery();
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '메모 추가';
      document.getElementById('modalDate').textContent = '';
      document.getElementById('fieldIdea').value = '';
      document.getElementById('fieldContent').value = '';
      document.getElementById('fieldUrl').value = '';
      document.getElementById('fieldStatus').value = '분류 전';
      const sel = document.getElementById('fieldFolder');
      if (pendingFolderId) sel.value = pendingFolderId;
      document.getElementById('memoModal').classList.add('open');
    }

    function openEditModal(pageId) {
      const memo = allMemos.find(m => m.id === pageId);
      if (!memo) return;
      editingId = pageId;
      document.getElementById('modalTitle').textContent = '메모 편집';
      document.getElementById('modalDate').textContent = memo.created ? '추가된 날짜: ' + formatDate(memo.created) : '';
      document.getElementById('fieldIdea').value = memo.idea || '';
      document.getElementById('fieldContent').value = memo.content || '';
      document.getElementById('fieldUrl').value = memo.url || '';
      document.getElementById('fieldStatus').value = memo.status || '분류 전';
      const sel = document.getElementById('fieldFolder');
      sel.value = memo.folders[0] || (pendingFolderId || '');
      document.getElementById('memoModal').classList.add('open');
    }

    function closeModal() { document.getElementById('memoModal').classList.remove('open'); }
    document.getElementById('memoModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    async function saveMemo() {
      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = '저장 중...';
      const idea = document.getElementById('fieldIdea').value.trim();
      const content = document.getElementById('fieldContent').value.trim();
      const url = document.getElementById('fieldUrl').value.trim();
      const status = document.getElementById('fieldStatus').value;
      const folderId = document.getElementById('fieldFolder').value || pendingFolderId;
      const folder_ids = folderId ? [folderId] : (pendingFolderId ? [pendingFolderId] : []);
      try {
        const action = editingId ? 'updateMemo' : 'addMemo';
        const body = editingId
          ? { page_id: editingId, idea, content, url, status, folder_ids }
          : { idea, content, url, status, folder_ids };
        const res = await fetch('/api/notion?action=' + action, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) { closeModal(); await loadMemos(); }
        else alert('저장 실패: ' + (data.error || '알 수 없는 오류'));
      } catch(e) {
        alert('저장 중 오류: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '저장';
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
